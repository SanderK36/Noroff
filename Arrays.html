<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
    let favoriteFoods = ["Pizza", "Cheese Burger", "Kebab"]
    console.log(favoriteFoods[0]);
    console.log(favoriteFoods[2]);

    favoriteFoods[1] = "Sushi";
    console.log(favoriteFoods[1]);

    console.log(favoriteFoods);

    console.log(favoriteFoods[4])

    favoriteFoods.unshift("Egg")
    favoriteFoods.unshift("Baktpotet")
    favoriteFoods.unshift("Pasta")
    console.log(favoriteFoods)

    favoriteFoods.pop([6])
    console.log(favoriteFoods)

    console.log("Activity 2")

    let fruits = ["Apple", "Banana", "Kiwi"]

    console.log(fruits)

    console.log("There are " + fruits.length + " fruits in this array")

    fruits.push("Melon")

    console.log("Added Melon to the end of the array with push ")
    console.log(fruits)

    console.log("Added Strawberries at the start of the array with unshift ")

    fruits.unshift("Strawberries")
    console.log(fruits)

    console.log("Removed the last item in the array with a .pop()")
    fruits.pop()
    console.log(fruits)

    console.log("Removed the first item in the array with a .shift()")
    fruits.shift()
    console.log(fruits)

    console.log("Now over to splice / slice")

    let coldDrinks = ["Coke", "Fanta"];
    let hotDrinks = ["Tea", "Coffee"];
    let allDrinks = [...coldDrinks, ...hotDrinks];
    console.log(allDrinks);

    const favorites = allDrinks.slice(1, 3);
    console.log(favorites);
    console.log(allDrinks);

    snacks = ["Chips", "Popcorn", "Nuts"];
    snacks.splice(2, 0, "Fruit");
    console.log(snacks);

    const desserts = ["Cake", "Pie", "Ice Cream", "Brownie"];
    const removedDesserts = desserts.splice(1, 2);
    console.log(removedDesserts)
    console.log(desserts)

    const mains = ["Burger", "Pizza", "Pasta"];

    mains.splice(1, 1, "salad", "soup");
    console.log(mains)


    const pets = ["dog", "cat", "parrot", "hamster"]

    for (let i = 0; i < fruits.length; i++) {
        console.log("Pet: " + (i + 1) + ": " + pets[i])
    }

    for (const pet of pets) {
        console.log("I wish i had a " + pet + ".")
    }

    const seatingChart = [
        ["A1", "A2", "A3", "A4"],
        ["B1", "B2", "B3", "B4"],
        ["C1", "C2", "C3", "C4"]
    ]

    for (let row = 0; row < seatingChart.length; row ++) {
        for (let col = 0; col < seatingChart[row].length; col++) {
            console.log("Checking seat:" + seatingChart[row][col])
        }
    }

</script>
