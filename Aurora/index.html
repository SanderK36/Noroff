<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hei hjertemitt ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="hearts-container"></div>

  <div class="container">
    <div id="message" class="message"></div>
    
    <div id="buttons" class="buttons">
      <button id="no" class="btn no">Nei</button>
      <button id="yes" class="btn yes">
        <span id="yes-text">Ja</span>
      </button>
    </div>

    <div id="final" class="final hidden">
      <div class="big-heart">❤️</div>
      <p>Takk for at du holder ut med en idiot som meg❤️. Jeg er så heldig som har en så vakker, omtenksom, sterk, flink og hardtarbeidende jente som deg i livet mitt❤️.</p>
      <p>Og jeg vil veldig gjerne feire flere valentines med deg❤️.</p>
      <p class="love">Jeg elsker deg ❤️</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
