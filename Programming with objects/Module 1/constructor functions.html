<body>
    <script>
        //Class
        class MyClass {
            constructor(name, numberName, smallName, smallName2, status) {
                this.name = name;
                this.numberName = numberName;
                this.smallObject = {
                    smallName1: smallName1,
                    smallName2: smallName2
                }
                this.myStatus = status;
            }
            myFunc = function(statusValue) {
                    this.myStatus = statusValue
            }
        }

        //Object Constructor Function
        function MyFunction(name, numberName, smallName1, smallName2, status) {
                this.name = name;
                this.numberName = numberName;
                this.smallObject = {
                    smallName1: smallName1,
                    smallName2: smallName2
                }
                this.myStatus = status;
                this.myFunc = function(statusValue) {
                    this.myStatus = statusValue
                }
        }

        const object = new MyFunction("Sander", 20, "Sander", "Karlsen", "Hey")
        console.log(object)
    </script>
