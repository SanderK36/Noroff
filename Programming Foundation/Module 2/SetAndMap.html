<script>
    //Create a Set called attendees and add "Alex", "Mina", "Jo", "Mina", "Kai". 
    // Print the set to confirm duplicates are removed.
    // Check if "Jo" is attending.
    const attendees = new Set();
    attendees.add("Alex");
    attendees.add("Mina");
    attendees.add("Jo");
    attendees.add("Mina");
    attendees.add("Kai");

    console.log(attendees);
    console.log("Is Jo attending?", attendees.has("Jo"));

    //Create a Map called seating that pairs each attendee’s name with their table number:
    // "Alex" → 1
    // "Mina" → 2
    // "Jo" → 1
    // "Kai" → 3

    const seating = new Map();
    seating.set("Alex", 1);
    seating.set("Mina", 2);
    seating.set("Jo", 1);
    seating.set("Kai", 3);

    //The organiser changes Jo’s table to 4. Update the Map.
    seating.set("Jo", 4);

    //Loop through the Map and print each person’s name and their table.
    for (const [name, table] of seating) {
        console.log(`${name} is seated at table ${table}`);
    }
</script>
