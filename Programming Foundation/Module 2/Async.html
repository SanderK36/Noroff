<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
<script>
    console.log("Start");

    setTimeout(function () {
        console.log("First timeout");
    }, 800);

    const id = setInterval(function () {
        console.log("Tick");
    }, 500);

    setTimeout(function () {
        console.log("Stop");
        clearInterval(id);
    }, 1600);

    console.log("End");
</script>
</html>
