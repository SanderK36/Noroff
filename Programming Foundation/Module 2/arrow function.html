<script>
    function performOnEach(numbers, operation) {
        const result = [];

        for (const num of numbers) {
            result.push(operation(num))
        }
        return result;
    }

    console.log(performOnEach([1, 2, 3], (num) => num * 2));
    console.log(performOnEach([1, 2, 3], (num) => num / 2));
    console.log(performOnEach([1, 2, 3], (num) => num ** 2));
    console.log(performOnEach([1, 2, 3], (num) => -num));
    
</script>
</html>
