<script>
    //Activity 1: Write a loop that prints 1 - 10
    for (let i = 0; i <= 10; i++) {
        console.log(i)
    }

    console.log("Activity 2:")

    //Activity 2:The following code is meant to print the numbers: 0,1,2,3,4; but it currently does not. Change the code without moving the incrementing statement (i++) into the loop declaration, i.e., keep it in the body.
    for (let i = 0; i < 5;) {
        console.log(i)
        i++;
    }

    console.log("Activity 3:")
    //Activity 3:Write a for loop that prints the numbers 1,3,5,7,9 without using any if statements. Hint: Instead of i++, use something else for the final expression.

    for (let i = 1; i < 10; i +=2){
        console.log(i)
    }

    console.log("Activity 4:")
    //Write a loop that prints the numbers 10,9,8,7,6,5 Hint: We are counting down, think about where we need to start, where we need to end up, and how we need to get there.

    for (let i = 10; i >= 5; i--) {
        console.log(i);
    }

</script>
