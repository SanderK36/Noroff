<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../jquery-3.6.0.js"></script>
</head>
<body>
    <!-- Create the grid with four cells. On a screen size higher than medium, show four columns. On a screen size higher than small, show two columns. Otherwise, show one column. Each cell should have a different colour. -->
    <div class="container">
        <div class="row">
            <div class="bg-warning col">Cell 1</div>
            <div class="bg-secondary col">Cell 2</div>
            <div class="bg-success col">Cell 3</div>
            <div class="bg-danger col">Cell 4</div>
        </div>
    </div>
</body>
</html>
