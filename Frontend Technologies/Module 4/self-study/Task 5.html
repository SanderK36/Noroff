<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../jquery-3.6.0.js"></script>
</head>
<body>
    <!-- Create a dropdown with four links. The fourth link should be separated from the separator. All links can link to the https://google.com page. -->

    <div class="dropdown">
        <button type="button" class="btn btn-primary dropdown-toggle  m-3 p-2" data-bs-toggle="dropdown"> Dropdown Button</button>
        <ul class="dropdown-menu">
            <li><a href="https://google.com" class="dropdown-item">Link 1</a></li>
            <li><a href="https://google.com" class="dropdown-item">Link 2</a></li>
            <li><a href="https://google.com" class="dropdown-item">Link 3</a></li>
            <li class="dropdown-divider"></li>
            <li><a href="https://google.com" class="dropdown-item">Link 4</a></li>
        </ul>
    </div>
</body>
</html>
