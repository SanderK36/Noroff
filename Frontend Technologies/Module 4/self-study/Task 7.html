<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../jquery-3.6.0.js"></script>
</head>
<body>
    <!-- Create a standard carousel containing the following two images:
     https://cdn.pixabay.com/photo/2022/07/07/11/15/rainbow-7307023__340.png

     https://cdn.pixabay.com/photo/2022/03/30/13/16/betta-7101167__340.jpg
      -->
     
      <div id="carouselExampleControls" class="container p-5 carousel slide" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="https://cdn.pixabay.com/photo/2022/07/07/11/15/rainbow-7307023__340.png" alt="Image 1" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="https://cdn.pixabay.com/photo/2022/03/30/13/16/betta-7101167__340.jpg" alt="Image 2" class="d-block w-100">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden"><i class="bi bi-arrow-left"></i></span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden"><i class="bi bi-arrow-right"></i></span>
        </button>
      </div>
</body>
</html>
