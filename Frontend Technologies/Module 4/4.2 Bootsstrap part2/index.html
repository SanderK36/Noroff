<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../jquery-3.6.0.js"></script>
</head>
<body>
    <!-- Navbar -->
     <nav class="navbar navbar-expand-lg bg-light">
        <div class="container-fluid">
            <a href="#" class="navbar-brand">Navbar</a>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0 d-flex flex-row gap-3">
                <li class="nav-item">
                    <a href="#" class="nav-link"><i class="bi bi-1-circle fs-4"></i></a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link"><i class="bi bi-1-square fs-4"></i></a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link"><i class="bi bi-1-circle-fill fs-4"></i></a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link toast-trigger" role="button"><i class="bi bi-1-square-fill fs-4"></i></a>
                </li>
            </ul>
        </div>
     </nav>
     <!-- Carousel -->
      <div id="carouselExampleControls" class="container p-5 carousel carousel-dark slide" style="width: 300px" data-bs-ride="carousel">
        <div class="carousel-inner">

            <div class="carousel-item active">
                <img src="https://cdn.pixabay.com/photo/2018/04/13/16/13/pixel-3316924_960_720.png" class="d-block w-100" alt="Bulbasaur">
            </div>

            <div class="carousel-item">
                <img src="https://cdn.pixabay.com/photo/2021/02/07/19/52/pikachu-5992504_1280.png" class="d-block w-100" alt="Pikachu">
            </div>

        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
            <span class="visually-hidden">Previous</span>
        </button>

        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleControls" data-bs-slide="next">
           <span class="carousel-control-next-icon"></span>
           <span class="visually-hidden">Next</span>
        </button>
      </div>

      <!-- Buttons -->
       <div class="text-center">
        <div class="btn-group" role="group" aria-label="Basic mixed style example">
            <button type="button" class="btn btn-danger">Left</button>
            <button type="button" class="btn btn-warning">Middle</button>
            <button type="button" class="btn btn-success">Right</button>
        </div>
       </div>

       <!-- Toast -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 11">
            <div id="myToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
                <div class="toast-header">
                    <strong class="me-auto">Bootstrap</strong>
                    <small>Just now</small>
                    <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                </div>
                <div class="toast-body">
                    Hello, world! This is a toast message.
                </div>
            </div>
        </div>

        <script>
            $(document).ready(function(){
                $(".toast-trigger").click(function(){
                    $("#myToast").toast("show");
                });
            });
        </script>
</body>
</html>
