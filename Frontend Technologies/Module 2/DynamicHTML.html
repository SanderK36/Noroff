<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="para1">Paragraph 1</p>

    <script>
        setInterval(() => {
            if (Math.random() > 0.5) {
                document.getElementById("para1").style.backgroundColor = "red";
            } else {
                document.getElementById("para1").style.backgroundColor = "blue";
            }
        }, 5000)
    </script>
</body>
</html>
