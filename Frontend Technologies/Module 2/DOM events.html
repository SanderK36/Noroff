<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="clickMe()">Click me for alert!</button>

    <button id="btn2" onclick="clickMe()">Click me to change background color!</button>

    <script>
        //change the button text with addEventListener
        const button = document.querySelector('button');
        button.addEventListener('click', function() {
            button.textContent = 'Clicked!';
        });


        const bgButton = document.getElementById('btn2').addEventListener('click', changeBg);

        function changeBg() {
            this.style.backgroundColor = 'green';
        }

        function clickMe() {
            alert('Hello world!');
        }
    </script>
</body>
</html>
