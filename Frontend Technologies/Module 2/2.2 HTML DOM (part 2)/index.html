<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>

<script>
    let heading = document.createElement("h2");
    let node = document.createTextNode("JavaScript HTML DOM");
    heading.appendChild(node);
    document.body.appendChild(heading);

    let para = document.createElement("p");
    node = document.createTextNode("Add a new HTML Element.");
    para.appendChild(node);
    document.body.appendChild(para);


    //Create & append empty div
    let div = document.createElement("div");
    document.body.appendChild(div);

    //Create paragraph
    para = document.createElement("p");
    node = document.createTextNode("This is a paragraph");
    para.appendChild(node)
    //append to div
    div.appendChild(para)

    //create another paragraph
    para = document.createElement("p");
    node = document.createTextNode("This is another paragraph");
    para.appendChild(node);

    //append to same div
    div.appendChild(para)

    

</script>
</html>
