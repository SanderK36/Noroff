<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p><button onclick="openWin()">Start</button></p>
</body>

<script>
  function openWin() {
    myWindow = window.open("", "", "width=200, height=100");
    setTimeout(() =>{
        resizeWin()
    }, (5000));
  }

  function resizeWin() {
    myWindow.resizeTo(300, 300);
    setTimeout(() => {
        moveWinTo()
    }, 5000);
  }

  function moveWinTo() {
    myWindow.moveTo(1, 999);
    setTimeout(() =>{
        myWindow.close();
    }, 5000);
  }


</script>
</html>
