<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- Create two text paragraphs. Without giving them either ID or class, create a button that changes the font colour of the first one to red and the second one to green. -->
     <p>Paragraph 1</p>
     <p>Paragraph 2</p>

     <button onclick="changeColor()">Change color</button>

    <script>
        function changeColor(){
            let p1 = document.getElementsByTagName("p")[0]
            let p2 = document.getElementsByTagName("p")[1]
            p1.style.color = "red"
            p2.style.color = "green"
        }
    </script>
</body>
</html>
