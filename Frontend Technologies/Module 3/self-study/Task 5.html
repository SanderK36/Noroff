<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="../jquery-3.6.0.js"></script>
</head>
<body>
    <!-- task:
        Make functionalities for these three buttons:

        Button 1 should change all paragraphs having lang attribute set to Bulbasaur images of size: width: 235px, height 220px.

        Button 2 should add empty button of text “empty button” after Button 1.

        Button 3 should append the current text of the first paragraph to all paragraph texts. -->
        <div id="example">
            <p id="para1" class="classA">The first paragraph.</p>
            <p class="classA">The second paragraph.</p>
            <p class="classB" id="para3">The third paragraph.</p>
            <p class="classB" id="para4" lang="en-us">The fourth paragraph.</p>
            <p class="classA" id="para5" lang="en-gb">The fifth paragraph.</p>
        </div>

        <button onclick="button1Click()">Button 1</button>
        <button onclick="button2Click()">Button 2</button>
        <button onclick="button3Click()">Button 3</button>

        <script>
            function button1Click() {
                $("p[lang]").html("<img src='https://cdn.pixabay.com/photo/2018/04/13/16/13/pixel-3316924_960_720.png' width='235px' height='220px'>")
            }

            function button2Click() {
                $("button:first").after("<button>Empty Button</button>")
            }

            function button3Click() {
                let firstParagraphText = $("p:first").text()
                $("p").append(firstParagraphText)
            }
        </script>
</body>
</html>
