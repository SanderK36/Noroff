<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="/Frontend Technologies/Module 3/jquery-3.6.0.js"></script>
</head>
<body>
    <div id="example">
        <div>First paragraph</div>
        <p class="classA">second paragraph</p>
        <p id="para3">third paragraph</p>
        <div>fourth paragraph</div>
        <p class="classA">the fifth paragraph</p>
    </div>
    <button onclick="action1()">Button 1</button>
    <button onclick="action2()">Button 2</button>
    <button onclick="action3()">Button 3</button>

    <script>
        function action1(){
            $("#para3").next().css("background-color", "yellow")
        }

        function action2(){
            $("div:first-of-type").css("text-align", "right")
        }

        function action3(){
            $("p:even").css("font-size", "20px");
        }
    </script>
</body>
</html>
